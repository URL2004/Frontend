<div id="noticeContent" style="display:none">
 <section class="gp-notice-page">
  <div class="gp-page-head">
   <div>
    <h2>공지사항</h2>
    <p>서비스의 최신 소식과 중요한 안내를 확인하세요.</p>
   </div>
   <div id="noticeAdminBtn"></div>
  </div>

  <div class="gp-search">
   <input type="search" placeholder="공지사항을 검색하세요">
   <button type="button" aria-label="검색">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m16.5 16.5 4.5 4.5"/></svg>
   </button>
  </div>

  <div class="gp-notice-featured">
   <article class="gp-notice-card maintenance">
    <div>
     <span>서비스 리뉴얼</span>
     <h3>교수님 피하기, 라벤더 톤으로 새단장했어요</h3>
     <p>메인 작성 화면부터 공지·커뮤니티·문의·마이페이지까지 전체 화면을 더 깔끔하고 편안하게 다시 디자인했어요.</p>
     <small>2026.06.13</small>
    </div>
    <img loading="lazy" decoding="async" src="/assets/img/notice-maintenance.png" alt="">
   </article>
   <article class="gp-notice-card update">
    <div>
     <span>엔진 리뉴얼</span>
     <h3>교수님 피하기 엔진이 더 똑똑해졌어요</h3>
     <p>AI 감지 회피 정확도와 문장의 자연스러움을 끌어올리도록 분석·재작성 엔진을 새롭게 강화했어요.</p>
     <small>2026.06.13</small>
    </div>
    <img loading="lazy" decoding="async" src="/assets/img/notice-analytics.png" alt="">
   </article>
  </div>

  <div id="noticeWriteForm" style="display:none" class="wform">
   <input id="ntitle" type="text" placeholder="공지 제목">
   <textarea id="nbody_input" placeholder="공지 내용을 입력하세요..."></textarea>
   <div class="wform-ft">
    <div></div>
    <div class="wform-btns">
     <button class="cancelbtn" onclick="document.getElementById('noticeWriteForm').style.display='none'">취소</button>
     <button class="postsubmit" id="noticeSubmit" onclick="submitNotice()">등록</button>
    </div>
   </div>
  </div>

  <section class="gp-table-panel">
   <div class="gp-table-toolbar">
    <div class="cat-filter">
     <button class="cat-fbtn active">전체</button>
     <button class="cat-fbtn">업데이트</button>
     <button class="cat-fbtn">점검</button>
     <button class="cat-fbtn">이벤트</button>
     <button class="cat-fbtn">정책</button>
    </div>
    <button class="gp-sort-select">최신순</button>
   </div>
   <div id="noticeList" class="gp-board-list"></div>
  </section>
 </section>
</div>
