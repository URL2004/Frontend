<div id="qnaContent" style="display:none">
 <input type="hidden" id="curQuestionId">
 <div id="qnaListView">
  <section class="gp-page-grid gp-qna-page">
   <div class="gp-page-primary">
    <div class="gp-page-head">
     <div>
      <h2>문의하기</h2>
      <p>결제·계정·오류 등 궁금하거나 문제가 있으면 1:1로 남겨주세요. 운영팀이 직접 답변드리고, 내가 남긴 문의와 답변만 볼 수 있어요.</p>
     </div>
     <div class="gp-qna-action">
      <button class="wbtn" onclick="document.getElementById('qform').style.display=document.getElementById('qform').style.display==='none'?'block':'none'">문의 남기기</button>
      <span>로그인 후 문의를 남길 수 있어요.</span>
     </div>
    </div>

    <div class="gp-inq-quick">
     <div>
      <strong>더 빠르게 답받고 싶다면</strong>
      <span>카카오톡으로 실시간 문의하세요 · 평일 09:00~23:59</span>
     </div>
     <button type="button" onclick="openKakaoInquiry()">카카오톡 1:1 문의</button>
    </div>

    <div class="wform" id="qform">
     <input id="qtitle" type="text" placeholder="제목">
     <textarea id="qbody" placeholder="문제 상황을 자세히 적어주세요. 사용 환경과 오류 메시지를 함께 적으면 빠른 답변에 도움이 됩니다."></textarea>
     <div class="wform-ft">
      <label class="anon-label"><input type="checkbox" id="qAnon">익명으로 작성</label>
      <div class="wform-btns">
       <button class="cancelbtn" onclick="document.getElementById('qform').style.display='none'">취소</button>
       <button class="postsubmit" id="qsubmit" onclick="submitQuestion()">문의 등록</button>
      </div>
     </div>
    </div>

    <div class="gp-inq-list-head">문의 내역</div>
    <div id="questionList" class="gp-board-list"></div>
   </div>

   <aside class="gp-page-aside">
    <article class="gp-visual-card gp-qna-help">
     <img loading="lazy" decoding="async" src="/assets/img/hero-shield.png" alt="">
     <div>
      <strong>먼저 자주 묻는 질문을 확인해 보세요</strong>
      <p>비슷한 질문은 이미 정리돼 있을 수 있어요. FAQ에서 더 빠르게 확인하세요.</p>
      <button type="button" onclick="switchTab('faq')">자주 묻는 질문 보기</button>
     </div>
    </article>
    <article class="gp-aside-card gp-support-time">
     <h3>운영 시간</h3>
     <p>평일 09:00 - 23:59<br>주말 및 공휴일 포함</p>
     <span>평균 답변 시간 6시간 이내</span>
    </article>
   </aside>
  </section>
 </div>
 <div id="qnaDetailView" style="display:none">
  <button class="backbtn" onclick="backToQList()">목록으로</button>
  <div id="questionDetail"></div>
 </div>
</div>
